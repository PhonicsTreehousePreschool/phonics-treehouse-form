<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Summer Camp Registration</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: #111827;
            background: #f8fafc;
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; min-height: 100%; }
        body { background: linear-gradient(180deg, #ffedd5 0%, #fed7aa 45%, #fb923c 100%); padding: 1rem; }
        .registration-form { max-width: 900px; margin: 0 auto; background: linear-gradient(180deg, #f97316 0%, #fb923c 100%); border: 1px solid rgba(255,255,255,0.3); border-radius: 28px; box-shadow: 0 24px 80px rgba(15,23,42,0.18); overflow: hidden; padding: 2rem; }
        .page-header { margin-bottom: 1.5rem; text-align: left; display: grid; gap: 1rem; }
        .page-header .logo { display: inline-flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; border-radius: 24px; background: rgba(255,255,255,0.18); width: fit-content; }
        .page-header .logo img { display:block; height:96px; width:auto }
        .page-header .eyebrow { margin:0; text-transform:uppercase; letter-spacing:0.18em; font-size:0.78rem; color:#2563eb }
        .page-header h1 { margin:0; font-size:clamp(1.5rem,2.2vw,2rem); line-height:1.05; color:#0f172a }
        section { margin-bottom:1.25rem; padding:1.2rem 1.3rem; background:#ffffff; border:1px solid #e2e8f0; border-radius:22px }
        section h2 { margin:0 0 0.75rem; font-size:1rem; font-weight:700; color:#0f172a }
        label { display:block; margin:0.6rem 0 0.35rem; color:#334155; font-size:0.95rem }
        label.required::after { content: " *"; color:#dc2626; font-weight:700 }
        input, select, textarea { width:100%; min-width:0; max-width:100%; font:inherit; border:1px solid #cbd5e1; border-radius:12px; background:#f8fafc; padding:0.8rem 0.9rem; color:#0f172a }
        input:focus, select:focus, textarea:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 4px rgba(59,130,246,0.12) }
        .conditional-group { margin-top:0.6rem; display:grid; gap:0.6rem }
        .conditional-group.hidden { display:none }
        .agreement-section label[for="agreement"] { display:flex; align-items:flex-start; gap:0.6rem; line-height:1.3 }
        .agreement-signing { display:grid; gap:1rem; margin-top:1rem }
        @media (min-width:768px){ .agreement-signing{ grid-template-columns:repeat(2,minmax(0,1fr)) } }
        button { display:inline-flex; align-items:center; justify-content:center; width:100%; padding:0.9rem 1rem; margin-top:0.75rem; background:#2563eb; color:#fff; border:none; border-radius:12px; font-weight:700; cursor:pointer }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="logo"><img src="imgs/phncs-logo.png" alt="Phonics Treehouse Logo"></div>
        <p class="eyebrow">Summer Camp Registration</p>
        <h1>Phonics Treehouse Summer Camp</h1>
        <p class="lead">Register your child for one of our themed weeks.</p>
    </header>

    <form class="registration-form" method="post" action="#">
        <section>
            <h2>Which camp would you like to register for?</h2>
            <label for="camp-choice" class="required">Select a camp</label>
            <select id="camp-choice" name="camp-choice" required>
                <option value="" disabled selected>Please select</option>
                <option>Dino Discoveries</option>
                <option>Pirate Adventures</option>
                <option>Fairy Gardening</option>
                <option>Wet and Wild Week</option>
            </select>
        </section>

        <section>
            <h2>Child's Name</h2>
            <label for="child-first" class="required">First Name</label>
            <input id="child-first" name="child-first" type="text" required>
            <label for="child-last" class="required">Last Name</label>
            <input id="child-last" name="child-last" type="text" required>
        </section>

        <section>
            <h2>Child's Address</h2>
            <label for="street1" class="required">Street</label>
            <input id="street1" name="street1" type="text" required>
            <label for="street2">Street 2</label>
            <input id="street2" name="street2" type="text">
            <label for="city" class="required">City</label>
            <input id="city" name="city" type="text" required>
            <label for="state" class="required">State</label>
            <input id="state" name="state" type="text" required>
            <label for="zip" class="required">Zip Code</label>
            <input id="zip" name="zip" type="text" required>
        </section>

        <section>
            <h2>Child Details</h2>
            <label for="dob" class="required">Date of Birth</label>
            <input id="dob" name="dob" type="date" required>
            <label for="gender" class="required">Gender</label>
            <select id="gender" name="gender" required>
                <option value="" disabled selected>Please select</option>
                <option>Female</option>
                <option>Male</option>
                <option>Non-binary</option>
                <option>Prefer not to say</option>
            </select>
        </section>

        <section>
            <h2>Allergies</h2>
            <label for="allergies-s">Does your child have any allergies?</label>
            <select id="allergies-s" name="allergies-s" required>
                <option value="" disabled selected>Please select</option>
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select>
            <div class="conditional-group hidden" id="allergy-group-s">
                <label for="allergy-text-s">Describe allergies</label>
                <textarea id="allergy-text-s" name="allergy-text-s" placeholder="Please explain your child's allergies"></textarea>
            </div>
        </section>

        <section>
            <h2>Conditions</h2>
            <label for="conditions-s">Does your child have any conditions that will affect play at camp?</label>
            <select id="conditions-s" name="conditions-s" required>
                <option value="" disabled selected>Please select</option>
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select>
            <div class="conditional-group hidden" id="conditions-group-s">
                <label for="conditions-text-s">Describe conditions</label>
                <textarea id="conditions-text-s" name="conditions-text-s" placeholder="Please explain these conditions"></textarea>
            </div>
        </section>

        <section>
            <h2>Mother / Female Guardian</h2>
            <label for="mother-name">Mother or Female Guardian's Name</label>
            <input id="mother-name" name="mother-name" type="text">
            <label for="mother-cell">Mother or Female Guardian's Cell Phone Number</label>
            <input id="mother-cell" name="mother-cell" type="tel" placeholder="(000) 000-0000">
            <label for="mother-email">Mother or Female Guardian's Email</label>
            <input id="mother-email" name="mother-email" type="email">
        </section>

        <section>
            <h2>Father / Male Guardian</h2>
            <label for="father-name">Father or Male Guardian's Name</label>
            <input id="father-name" name="father-name" type="text">
            <label for="father-cell">Father or Male Guardian's Cell Phone Number</label>
            <input id="father-cell" name="father-cell" type="tel" placeholder="(000) 000-0000">
            <label for="father-email">Father or Male Guardian's Email</label>
            <input id="father-email" name="father-email" type="email">
        </section>

        <section>
            <h2>Authorized Pick-up</h2>
            <label for="pickup-list" class="required">In addition to those listed above, the following individuals may pick up my child</label>
            <textarea id="pickup-list" name="pickup-list" required placeholder="Name / Relationship / Contact information"></textarea>
        </section>

        <section class="agreement-section">
            <label for="agreement" class="required">
                <input type="checkbox" id="agreement" name="agreement" required>
                By signing this document, you agree that everything above is true and you allow your child to participate in the activities at The Phonics Treehouse Summer Camp.
            </label>

            <div class="agreement-signing">
                <div>
                    <label for="signature" class="required">Print Signature of Parent/Guardian</label>
                    <input id="signature" name="signature" type="text" required>
                </div>
                <div>
                    <label for="sign-date" class="required">Date of Signing</label>
                    <input id="sign-date" name="sign-date" type="date" required>
                </div>
            </div>
        </section>

        <!-- Hidden keys provided -->
        <input type="hidden" name="service_id" value="service_iiark4v">
        <input type="hidden" name="public_key" value="acWjVPeC8L1j3KXy9">
        <input type="hidden" name="template_id" value="template_sidrwn8">
        <input type="hidden" id="recipient-email" name="recipient_email">
        <input type="hidden" id="recipient-name" name="recipient_name">
        <input type="hidden" id="child-name" name="child_name">

        <button type="submit">Submit</button>
    </form>

    <script>
        var motherName = document.getElementById('mother-name').value.trim();
        var motherEmail = document.getElementById('mother-email').value.trim();
        var fatherName = document.getElementById('father-name').value.trim();
        var fatherEmail = document.getElementById('father-email').value.trim();

        var childFirst = document.getElementById('child-first').value.trim();
        var childLast = document.getElementById('child-last').value.trim();

        document.getElementById('child-name').value = childFirst + ' ' + childLast;

        document.getElementById('recipient-email').value = motherEmail || fatherEmail;
        document.getElementById('recipient-name').value = motherName || fatherName;
        // set today's date for the signing date
        document.addEventListener('DOMContentLoaded', function(){
            var signDate = document.getElementById('sign-date');
            if(signDate){
                var today = new Date();
                var yyyy = today.getFullYear();
                var mm = String(today.getMonth()+1).padStart(2,'0');
                var dd = String(today.getDate()).padStart(2,'0');
                signDate.value = yyyy+"-"+mm+"-"+dd;
            }

            function toggleGroup(selectId, groupId, detailId){
                var sel = document.getElementById(selectId);
                var grp = document.getElementById(groupId);
                var detail = detailId ? document.getElementById(detailId) : null;
                if(!sel || !grp) return;
                function update(){
                    var show = sel.value === 'Yes';
                    grp.classList.toggle('hidden', !show);
                    if(detail) detail.required = show;
                }
                update();
                sel.addEventListener('change', update);
            }

            toggleGroup('allergies-s','allergy-group-s','allergy-text-s');
            toggleGroup('conditions-s','conditions-group-s','conditions-text-s');

            // guardian presence validation: at least one guardian name required
            var form = document.querySelector('.registration-form');
            if(form){
                form.addEventListener('submit', function(e){
                    var mother = document.getElementById('mother-name').value.trim();
                    var father = document.getElementById('father-name').value.trim();
                    if(!mother && !father){
                        e.preventDefault();
                        alert('Please provide the name for either the mother/female guardian or the father/male guardian.');
                        return false;
                    }
                });
            }
        });
    </script>
</body>
</html>
